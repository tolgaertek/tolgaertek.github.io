<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>İletişim | Tolga Ertek</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <header>
        <h1>İletişim</h1>
    </header>

    <nav>
        <ul>
            <li><a href="index.html">Ana Sayfa</a></li>
            <li><a href="about.html">Hakkımda</a></li>
            <li><a href="interests.html">İlgi Alanlarım</a></li>
            <li><a href="contact.html" class="active">İletişim</a></li>
        </ul>
    </nav>

    <main>
        <div class="contact-container">
            <h2>Detaylı İletişim Formu</h2>
            
            <form action="#">
                <label for="ad-soyad">Ad Soyad:</label>
                <input type="text" id="ad-soyad" name="ad-soyad" placeholder="Örn: Emre Yıldırım" required>

                <label for="email">E-posta Adresi:</label>
                <input type="email" id="email" name="email" placeholder="ornek@mail.com" required>

                <label for="konu">Konu:</label>
                <select id="konu" name="konu">
                    <option value="is-teklifi">İş Teklifi</option>
                    <option value="soru">Soru</option>
                    <option value="geri-bildirim">Geri Bildirim</option>
                </select>

                <label for="mesaj">Mesajınız:</label>
                <textarea id="mesaj" name="mesaj" rows="5" placeholder="Mesajınızı buraya yazın..."></textarea>

                <button type="submit" class="gonder-btn">GÖNDER</button>
            </form>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 CSS Temel Örnek. Bu sayfa basit bir HTML+CSS alıştırmasıdır.</p>
    </footer>

</body>
</html>
